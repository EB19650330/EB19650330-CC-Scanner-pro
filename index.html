<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CC Scanner Pro</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        📈 CC Scanner Pro
    </div>

    <nav>

        <a href="#">Dashboard</a>
        <a href="#">Scanner</a>
        <a href="#">Strategieën</a>
        <a href="#">Instellingen</a>

    </nav>

</header>

<section class="stats">

    <div class="card">
        <h3>USDC Pairs</h3>
        <span id="pairCount">0</span>
    </div>

    <div class="card">
        <h3>Buy Signals</h3>
        <span id="buySignals" class="green">0</span>
    </div>

    <div class="card">
        <h3>Sell Signals</h3>
        <span id="sellSignals" class="red">0</span>
    </div>

    <div class="card">
        <h3>Laatste Update</h3>
        <span id="lastUpdate">--:--</span>
    </div>

</section>

<section class="filters">

    <input
        id="search"
        type="text"
        placeholder="Zoek coin...">

    <select id="exchange">

        <option>Coinbase Spot</option>
        <option>Coinbase Futures</option>

    </select>

    <select id="timeframe">

        <option>1m</option>
        <option>2m</option>
        <option>3m</option>
        <option selected>5m</option>
        <option>15m</option>
        <option>1h</option>
        <option>4h</option>

    </select>

    <select id="volume">

        <option value="0">Alle volumes</option>
        <option value="250000">250K+</option>
        <option value="500000">500K+</option>
        <option value="1000000">1M+</option>
        <option value="5000000">5M+</option>

    </select>

    <button id="refreshButton">
        Scanner vernieuwen
    </button>

</section>

<section class="scanner">

    <table>

        <thead>

        <tr>

            <th>Pair</th>
            <th>Prijs</th>
            <th>24h Volume</th>
            <th>RSI</th>
            <th>MACD</th>
            <th>Stoch</th>
            <th>Trend</th>
            <th>Score</th>
            <th>Signaal</th>

        </tr>

        </thead>

        <tbody id="scannerTable">

            <tr>

                <td colspan="9">

                    Scanner wordt geladen...

                </td>

            </tr>

        </tbody>

    </table>

</section>

<footer>

    CC Scanner Pro © 2026

</footer>

<script src="js/settings.js"></script>
<script src="js/coinbase.js"></script>
<script src="js/indicators.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

</body>
</html>
